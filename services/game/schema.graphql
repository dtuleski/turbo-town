# Game Service GraphQL Schema

# Mutations

"""
Start a new game
"""
type Mutation {
  startGame(input: StartGameInput!): StartGameResponse!
  completeGame(input: CompleteGameInput!): CompleteGameResponse!
  
  # Language learning mutations
  saveLanguageGameResult(input: LanguageGameResultInput!): LanguageGameResult!
  
  # Admin - Language Data Management
  updateLanguageWord(input: UpdateLanguageWordInput!): LanguageWordAdmin!
  
  # Subscription mutations
  createCheckoutSession(input: CreateCheckoutSessionInput!): CheckoutSession!
  createPortalSession: PortalSession!
}

# Queries

"""
Get game by ID
"""
type Query {
  getGame(gameId: ID!): Game!
  getGameHistory(input: GameHistoryInput!): GameHistoryResponse!
  getUserStatistics: GameStatistics!
  canStartGame: CanStartGameResponse!
  listAvailableGames: [GameCatalogItem!]!
  
  # Language learning queries
  getLanguageWords(languageCode: String!, category: String!, difficulty: String!, count: Int!): [LanguageWord!]!
  getUserLanguageProgress: [LanguageProgress!]!
  getLanguageProgressByCode(languageCode: String!): LanguageProgress
  
  # Admin queries
  getAdminAnalytics: AdminAnalytics!
  listAllUsers(input: ListUsersInput): UserListResponse!
  
  # Admin - Language Data Management
  getAllLanguageWords: [LanguageWordAdmin!]!
  getLanguageWordById(wordId: ID!): LanguageWordAdmin
  
  # Subscription queries
  getSubscription: SubscriptionInfo!
  
  # Leaderboard queries (routed to Leaderboard Service)
  getLeaderboard(gameType: GameType!, timeframe: Timeframe!, limit: Int): LeaderboardResponse!
  getUserRank(gameType: GameType!, timeframe: Timeframe!): UserRankResponse
  getUserScoreHistory(gameType: GameType, limit: Int): [LeaderboardEntry!]!
}

# Input Types

input StartGameInput {
  themeId: ID!
  difficulty: Int! # 1-5
}

input CompleteGameInput {
  gameId: ID!
  completionTime: Int! # seconds
  attempts: Int!
}

input GameHistoryInput {
  page: Int # default: 1
  pageSize: Int # default: 20, max: 100
  sortBy: SortBy # default: date
  sortOrder: SortOrder # default: desc
  themeId: ID # filter by theme
  difficulty: Int # filter by difficulty (1-5)
  startDate: String # ISO 8601
  endDate: String # ISO 8601
}

enum SortBy {
  date
  score
  time
}

enum SortOrder {
  asc
  desc
}

# Response Types

type StartGameResponse {
  id: ID!
  userId: ID!
  themeId: ID!
  difficulty: Int!
  status: GameStatus!
  startedAt: String! # ISO 8601
  canPlay: Boolean!
  rateLimit: RateLimitInfo!
}

type CompleteGameResponse {
  id: ID!
  status: GameStatus!
  completedAt: String! # ISO 8601
  completionTime: Int! # seconds
  attempts: Int!
  score: Int!
  achievements: [Achievement!]!
  scoreBreakdown: ScoreBreakdown # NEW - Score calculation details
  leaderboardRank: Int # NEW - User's rank after this game
}

type GameHistoryResponse {
  games: [GameHistoryItem!]!
  pagination: PaginationInfo!
}

type CanStartGameResponse {
  canPlay: Boolean!
  rateLimit: RateLimitInfo!
  message: String
}

# Domain Types

type Game {
  id: ID!
  userId: ID!
  themeId: ID!
  theme: Theme
  difficulty: Int!
  status: GameStatus!
  startedAt: String! # ISO 8601
  completedAt: String # ISO 8601
  completionTime: Int # seconds
  attempts: Int
  score: Int
  createdAt: String! # ISO 8601
  updatedAt: String! # ISO 8601
}

type GameHistoryItem {
  id: ID!
  themeId: ID!
  themeName: String!
  difficulty: Int!
  completedAt: String! # ISO 8601
  completionTime: Int! # seconds
  attempts: Int!
  score: Int!
}

type GameStatistics {
  totalGames: Int!
  totalCompletedGames: Int!
  averageScore: Float!
  bestScore: Int!
  averageCompletionTime: Float! # seconds
  fastestCompletionTime: Int! # seconds
  totalAttempts: Int!
  averageAttempts: Float!
  favoriteTheme: FavoriteTheme
  favoriteDifficulty: Int!
  currentStreak: Int! # consecutive days
  longestStreak: Int! # best streak
}

type FavoriteTheme {
  id: ID!
  name: String!
}

type Achievement {
  type: AchievementType!
  unlocked: Boolean!
  progress: Int!
  completedAt: String # ISO 8601
}

type RateLimitInfo {
  tier: SubscriptionTier!
  limit: Int!
  used: Int!
  remaining: Int!
  resetAt: String! # ISO 8601
}

type PaginationInfo {
  total: Int!
  page: Int!
  pageSize: Int!
  hasMore: Boolean!
}

type Theme {
  id: ID!
  name: String!
  category: String!
  pairs: Int!
}

type ScoreBreakdown {
  baseScore: Float!
  difficultyMultiplier: Float!
  speedBonus: Float!
  accuracyBonus: Float!
  finalScore: Float!
  difficulty: String!
  completionTime: Float!
  accuracy: Float!
}

type GameCatalogItem {
  gameId: ID!
  title: String!
  description: String!
  icon: String!
  route: String!
  status: CatalogStatus!
  displayOrder: Int!
  ageRange: String!
  category: String!
}

# Enums

enum CatalogStatus {
  ACTIVE
  COMING_SOON
  MAINTENANCE
}

enum GameStatus {
  IN_PROGRESS
  COMPLETED
  ABANDONED
}

enum AchievementType {
  FIRST_WIN
  GAMES_10
  GAMES_50
  GAMES_100
  SPEED_DEMON
  PERFECT_GAME
  DIFFICULTY_MASTER
  THEME_EXPLORER
  STREAK_7
}

enum SubscriptionTier {
  FREE
  LIGHT
  STANDARD
  PREMIUM
}

# Admin Types

input ListUsersInput {
  page: Int # default: 1
  pageSize: Int # default: 50, max: 100
  tier: SubscriptionTier # filter by tier
  sortBy: UserSortBy # default: createdAt
  sortOrder: SortOrder # default: desc
}

enum UserSortBy {
  createdAt
  gamesPlayed
  lastActive
}

type UserListResponse {
  users: [AdminUserInfo!]!
  pagination: PaginationInfo!
}

type AdminUserInfo {
  userId: ID!
  email: String!
  username: String!
  tier: SubscriptionTier!
  gamesPlayed: Int!
  lastActive: String # ISO 8601
  createdAt: String! # ISO 8601
  todayPlays: Int!
  rateLimit: RateLimitInfo!
}

type AdminAnalytics {
  overview: AnalyticsOverview!
  usersByTier: [TierStats!]!
  recentActivity: RecentActivity!
  topUsers: [TopUser!]!
}

type AnalyticsOverview {
  totalUsers: Int!
  dau: Int! # Daily Active Users
  mau: Int! # Monthly Active Users (estimated)
  totalGamesPlayed: Int!
  totalGamesToday: Int!
  totalGamesThisWeek: Int!
  totalGamesThisMonth: Int!
  avgGamesPerUser: Float!
  conversionRate: Float! # % of free users who upgraded
}

type TierStats {
  tier: SubscriptionTier!
  count: Int!
  percentage: Float!
  avgGamesPerUser: Float!
  totalRevenue: Float! # Monthly revenue for this tier
}

type RecentActivity {
  last24Hours: ActivityPeriod!
  last7Days: ActivityPeriod!
  last30Days: ActivityPeriod!
}

type ActivityPeriod {
  uniqueUsers: Int!
  totalGames: Int!
  avgGamesPerUser: Float!
}

type TopUser {
  userId: ID!
  username: String!
  email: String!
  tier: SubscriptionTier!
  gamesPlayed: Int!
  lastActive: String!
}


# Subscription Types

type SubscriptionInfo {
  userId: ID!
  tier: String!
  status: String!
  stripeCustomerId: String
  currentPeriodEnd: String
}

type CheckoutSession {
  sessionId: ID!
  url: String!
}

type PortalSession {
  url: String!
}

input CreateCheckoutSessionInput {
  tier: String! # BASIC or STANDARD
}

# Language Learning Types

type LanguageWord {
  id: ID!
  word: String!
  pronunciation: String!
  correctImageUrl: String!
  distractorImages: [String!]!
  category: String!
}

type LanguageGameResult {
  gameId: ID!
  languageCode: String!
  score: Int!
  correctAnswers: Int!
  totalQuestions: Int!
  difficulty: String!
  category: String!
  timeSpent: Int!
  xpGained: Int!
}

type LanguageProgress {
  languageCode: String!
  xp: Int!
  level: Int!
  wordsLearned: Int!
  accuracy: Float!
  lastPlayed: String!
}

input LanguageGameResultInput {
  languageCode: String!
  score: Int!
  correctAnswers: Int!
  totalQuestions: Int!
  difficulty: String!
  category: String!
  timeSpent: Int!
  xpGained: Int!
}

# Admin Language Data Management Types

type LanguageWordAdmin {
  wordId: ID!
  category: String!
  difficulty: String!
  languageCode: String!
  imageUrl: String!
  distractorImages: [String!]!
  translations: LanguageTranslations!
  createdAt: String!
  updatedAt: String!
}

type LanguageTranslations {
  en: LanguageTranslation
  es: LanguageTranslation
  fr: LanguageTranslation
  de: LanguageTranslation
  it: LanguageTranslation
  pt: LanguageTranslation
}

type LanguageTranslation {
  word: String!
  pronunciation: String!
}

input UpdateLanguageWordInput {
  wordId: ID!
  imageUrl: String
  distractorImages: [String!]
  translations: UpdateLanguageTranslationsInput
}

input UpdateLanguageTranslationsInput {
  en: UpdateLanguageTranslationInput
  es: UpdateLanguageTranslationInput
  fr: UpdateLanguageTranslationInput
  de: UpdateLanguageTranslationInput
  it: UpdateLanguageTranslationInput
  pt: UpdateLanguageTranslationInput
}

input UpdateLanguageTranslationInput {
  word: String!
  pronunciation: String!
}

# Leaderboard Types

type LeaderboardResponse {
  entries: [LeaderboardEntry!]!
  currentUserEntry: LeaderboardEntry
  totalEntries: Int!
  timeframe: Timeframe!
}

type LeaderboardEntry {
  rank: Int!
  userId: ID!
  username: String!
  score: Float!
  gameType: GameType!
  difficulty: String!
  completionTime: Float!
  accuracy: Float!
  timestamp: String! # ISO 8601
  isCurrentUser: Boolean!
}

type UserRankResponse {
  rank: Int!
  score: Float!
  gameType: GameType!
  timeframe: Timeframe!
  totalPlayers: Int!
  percentile: Float!
}

enum GameType {
  MEMORY_MATCH
  MATH_CHALLENGE
  WORD_PUZZLE
  LANGUAGE_LEARNING
  OVERALL
}

enum Timeframe {
  DAILY
  WEEKLY
  MONTHLY
  ALL_TIME
}
